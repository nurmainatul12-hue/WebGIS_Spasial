        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

            {label: 'RTRW_Dompu<br /><table><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_HutanProduksiTerbatas0.png" /></td><td>Hutan Produksi Terbatas</td></tr><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_HutanProduksiTetap1.png" /></td><td>Hutan Produksi Tetap</td></tr><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_HutanTanaman2.png" /></td><td>Hutan Tanaman</td></tr><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_KawasanHutanKonservasi3.png" /></td><td>Kawasan Hutan Konservasi</td></tr><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_KawasanHutanLindung4.png" /></td><td>Kawasan Hutan Lindung</td></tr><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_KawasanHutanMangrove5.png" /></td><td>Kawasan Hutan Mangrove</td></tr><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_Pemukiman6.png" /></td><td>Pemukiman</td></tr><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_Perkebunan7.png" /></td><td>Perkebunan</td></tr><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_PertanianLahanKering8.png" /></td><td>Pertanian Lahan Kering</td></tr><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_PertanianLahanKeringCampuran9.png" /></td><td>Pertanian Lahan Kering Campuran</td></tr><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_Rawa10.png" /></td><td>Rawa</td></tr><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_Savana11.png" /></td><td>Savana</td></tr><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_Sawah12.png" /></td><td>Sawah</td></tr><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_SemakBelukar13.png" /></td><td>Semak/Belukar</td></tr><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_SemakBelukarRawa14.png" /></td><td>Semak/Belukar Rawa</td></tr><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_Tambak15.png" /></td><td>Tambak</td></tr><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_Tanahterbuka16.png" /></td><td>Tanah terbuka</td></tr><tr><td style="text-align: center;"><img src="legend/RTRW_Dompu_2_TubuhAir17.png" /></td><td>Tubuh Air</td></tr></table>', layer: layer_RTRW_Dompu_2},
            {label: 'PENGGUNAAN_TANAH<br /><table><tr><td style="text-align: center;"><img src="legend/PENGGUNAAN_TANAH_1_HutanBelukar0.png" /></td><td>Hutan Belukar</td></tr><tr><td style="text-align: center;"><img src="legend/PENGGUNAAN_TANAH_1_HutanLebat1.png" /></td><td>Hutan Lebat</td></tr><tr><td style="text-align: center;"><img src="legend/PENGGUNAAN_TANAH_1_HutanSejenisBakauJati2.png" /></td><td>Hutan Sejenis/Bakau,Jati</td></tr><tr><td style="text-align: center;"><img src="legend/PENGGUNAAN_TANAH_1_KampungJarang3.png" /></td><td>Kampung Jarang</td></tr><tr><td style="text-align: center;"><img src="legend/PENGGUNAAN_TANAH_1_KampungPadat4.png" /></td><td>Kampung Padat</td></tr><tr><td style="text-align: center;"><img src="legend/PENGGUNAAN_TANAH_1_KebunCampuran5.png" /></td><td>Kebun Campuran</td></tr><tr><td style="text-align: center;"><img src="legend/PENGGUNAAN_TANAH_1_KebunSejenis6.png" /></td><td>Kebun Sejenis</td></tr><tr><td style="text-align: center;"><img src="legend/PENGGUNAAN_TANAH_1_PadangRumput7.png" /></td><td>Padang Rumput</td></tr><tr><td style="text-align: center;"><img src="legend/PENGGUNAAN_TANAH_1_PerkebunanRakyat8.png" /></td><td>Perkebunan Rakyat</td></tr><tr><td style="text-align: center;"><img src="legend/PENGGUNAAN_TANAH_1_PerumahanJarang9.png" /></td><td>Perumahan Jarang</td></tr><tr><td style="text-align: center;"><img src="legend/PENGGUNAAN_TANAH_1_Sawah1xPadi1XPalawija10.png" /></td><td>Sawah 1x Padi, 1X Palawija</td></tr><tr><td style="text-align: center;"><img src="legend/PENGGUNAAN_TANAH_1_Semak11.png" /></td><td>Semak</td></tr><tr><td style="text-align: center;"><img src="legend/PENGGUNAAN_TANAH_1_SungaiDanauSituTelaga12.png" /></td><td>Sungai/Danau/Situ/Telaga</td></tr><tr><td style="text-align: center;"><img src="legend/PENGGUNAAN_TANAH_1_TambakGaram13.png" /></td><td>Tambak/Garam</td></tr><tr><td style="text-align: center;"><img src="legend/PENGGUNAAN_TANAH_1_TanahTerbukaSementara14.png" /></td><td>Tanah Terbuka Sementara</td></tr><tr><td style="text-align: center;"><img src="legend/PENGGUNAAN_TANAH_1_TegalanLadang15.png" /></td><td>Tegalan/Ladang</td></tr></table>', layer: layer_PENGGUNAAN_TANAH_1},

        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();



        // ======================
        // GLOBAL LAYER
        // ======================

        let uploadedLayer = null;

        // ======================
        // TOMBOL UPLOAD
        // ======================

        document.getElementById("uploadBtn")
        .addEventListener("click", function(){

            document.getElementById("fileInput").click();

        });

        // ======================
        // INPUT FILE
        // ======================

        document.getElementById("fileInput")
        .addEventListener("change", function(e){

            const file = e.target.files[0];

            if(!file) return;

            const ext = file.name.split('.').pop().toLowerCase();

            // Hapus layer lama
            if(uploadedLayer){
                map.removeLayer(uploadedLayer);
            }

            // ======================
            // GEOJSON
            // ======================

            if(ext === "geojson" || ext === "json"){

                const reader = new FileReader();

                reader.onload = function(evt){

                    const geojson = JSON.parse(evt.target.result);

                    uploadedLayer = L.geoJSON(geojson,{
                        style:{
                            color:"#ff0000",
                            weight:3
                        }
                    }).addTo(map);

                    // Zoom otomatis
                    map.fitBounds(uploadedLayer.getBounds());

                };

                reader.readAsText(file);
            }

            // ======================
            // KML
            // ======================

            else if(ext === "kml"){

                const reader = new FileReader();

                reader.onload = function(evt){

                    const parser = new DOMParser();

                    const kml = parser.parseFromString(
                        evt.target.result,
                        "text/xml"
                    );

                    const geojson = toGeoJSON.kml(kml);

                    uploadedLayer = L.geoJSON(geojson,{
                        style:{
                            color:"#00aa00",
                            weight:3
                        }
                    }).addTo(map);

                    // Zoom otomatis
                    map.fitBounds(uploadedLayer.getBounds());

                };

                reader.readAsText(file);
            }

            // ======================
            // SHP ZIP
            // ======================

            else if(ext === "zip"){

                const reader = new FileReader();

                reader.onload = function(evt){

                    shp(evt.target.result).then(function(geojson){

                        uploadedLayer = L.geoJSON(geojson,{
                            style:{
                                color:"#0000ff",
                                weight:3
                            }
                        }).addTo(map);

                        // Zoom otomatis
                        map.fitBounds(uploadedLayer.getBounds());

                    });

                };

                reader.readAsArrayBuffer(file);
            }

            else{
                alert("Format tidak didukung");
            }

        });

        // ======================
        // CARI KOORDINAT
        // ======================

        let coordinateMarker = null;

        document.getElementById("goToBtn")
        .addEventListener("click", function(){

            const lat = parseFloat(
                document.getElementById("latInput").value
            );

            const lng = parseFloat(
                document.getElementById("lngInput").value
            );

            if(isNaN(lat) || isNaN(lng)){
                alert("Koordinat tidak valid");
                return;
            }

            // Hapus marker lama
            if(coordinateMarker){
                map.removeLayer(coordinateMarker);
            }

            // Tambahkan marker
            coordinateMarker = L.marker([lat,lng])
            .addTo(map)
            .bindPopup(
                "Koordinat:<br>" + lat + ", " + lng
            )
            .openPopup();

            // Zoom otomatis
            map.setView([lat,lng], 16);

        });
        </script>  
        
        
        <!-- SHP -->
        <script src="https://unpkg.com/shpjs@latest/dist/shp.min.js"></script>

        <!-- KML -->
        <script src="https://unpkg.com/@tmcw/togeojson"></script>

        <!-- ZIP -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
